name: Release libaria2

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SwiftPM source package version. Leave empty to auto-increment."
        required: false
        default: ""
      version_line:
        description: "Version line for auto mode. main/latest uses the newest line; v1.0_maint uses 1.0.x."
        required: false
        default: "auto"
      initial_version:
        description: "Initial version when no matching tags exist."
        required: false
        default: "1.0.0"

permissions:
  contents: write

concurrency:
  group: release-libaria2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, package, update manifest, and release
    runs-on: macos-26
    steps:
      - name: Checkout DownloadManagerAria2
        uses: actions/checkout@v4
        with:
          path: DownloadManagerAria2
          fetch-depth: 0

      - name: Checkout DownloadManager
        uses: actions/checkout@v4
        with:
          repository: enefry/DownloadManager
          path: DownloadManager

      - name: Checkout ConcurrencyCollection
        uses: actions/checkout@v4
        with:
          repository: enefry/ConcurrencyCollection
          path: ConcurrencyCollection

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.5.app || sudo xcode-select -s /Applications/Xcode_26.4.1.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path

      - name: Install build tools
        run: brew install autoconf automake libtool

      - name: Resolve package version
        id: version
        working-directory: DownloadManagerAria2
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_VERSION_LINE: ${{ inputs.version_line }}
          INITIAL_VERSION: ${{ inputs.initial_version }}
          CURRENT_BRANCH: ${{ github.ref_name }}
        run: |
          git fetch --tags origin
          version="$(scripts/next-package-version.sh "$INPUT_VERSION" "$INPUT_VERSION_LINE" "$INITIAL_VERSION" "$CURRENT_BRANCH")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check release tag does not exist
        working-directory: DownloadManagerAria2
        env:
          RELEASE_TAG: ${{ steps.version.outputs.version }}
        run: |
          git fetch --tags origin
          ! git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null

      - name: Build libaria2 XCFramework
        working-directory: DownloadManagerAria2
        run: scripts/build-libaria2-xcframework.sh

      - name: Verify libaria2 XCFramework
        working-directory: DownloadManagerAria2
        run: scripts/verify-libaria2-xcframework.sh

      - name: Package libaria2 XCFramework
        working-directory: DownloadManagerAria2
        run: scripts/package-libaria2-xcframework.sh

      - name: Update Package.swift binary target
        working-directory: DownloadManagerAria2
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          checksum="$(cat dist/libaria2.xcframework.zip.checksum)"
          url="https://github.com/${REPOSITORY}/releases/download/${PACKAGE_VERSION}/libaria2.xcframework.zip"
          scripts/update-libaria2-binary-target.sh "$url" "$checksum"
          echo "LIBARIA2_CHECKSUM=$checksum" >> "$GITHUB_ENV"
          echo "LIBARIA2_URL=$url" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$PACKAGE_VERSION" >> "$GITHUB_ENV"

      - name: Validate Swift package with local XCFramework
        working-directory: DownloadManagerAria2
        env:
          DOWNLOAD_MANAGER_PACKAGE_PATH: ../DownloadManager
          LIBARIA2_XCFRAMEWORK_PATH: artifacts/libaria2/libaria2.xcframework
          SWIFT_MODULE_CACHE_PATH: .build/ci-swift-module-cache
          CLANG_MODULE_CACHE_PATH: .build/ci-swift-module-cache
        run: |
          swift build --target DownloadManager_Aria2Downloader \
            --cache-path .build/ci-spm-cache \
            --disable-index-store \
            --jobs 1
          swift test --filter Aria2DownloaderTests \
            --cache-path .build/ci-spm-cache \
            --disable-index-store \
            --jobs 1

      - name: Commit Package.swift update and tag source release
        working-directory: DownloadManagerAria2
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "Release DownloadManagerAria2 ${PACKAGE_VERSION}"
          git tag -a "$RELEASE_TAG" -m "DownloadManagerAria2 ${PACKAGE_VERSION}"
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "$RELEASE_TAG"

      - name: Create GitHub Release
        working-directory: DownloadManagerAria2
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          notes="$(printf 'SwiftPM:\n`.package(url: "https://github.com/%s.git", from: "%s")`\n\nlibaria2.xcframework.zip\n\nSwiftPM checksum:\n`%s`\n\nURL:\n%s' "${{ github.repository }}" "$RELEASE_TAG" "$LIBARIA2_CHECKSUM" "$LIBARIA2_URL")"

          gh release create "$RELEASE_TAG" \
            dist/libaria2.xcframework.zip \
            dist/libaria2.xcframework.zip.checksum \
            dist/libaria2.xcframework.zip.sha256 \
            --title "$RELEASE_TAG" \
            --notes "$notes"
